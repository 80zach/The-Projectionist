function score(film, ans, seen) {
if (seen.includes(film.t)) return -9999;
let s = 0;

// mood
const moodMap = {” Laugh”:“laugh”,” Feel something”:“feel”,” Be scared”:“scared”,” Mind blown”:“mindblow”,” Pure excitement”:“excited”,” Chill out”:“chill”};
if (ans.mood && film.mood.includes(moodMap[ans.mood])) s += 35;

// energy
const eMap = {“Zero - don’t make me think”:“zero”,“A little - easy watching”:“little”,“Medium - I’m engaged”:“mid”,“Full - give me something complex”:“full”};
if (ans.energy) { if (film.energy.includes(eMap[ans.energy])) s += 22; }

// length
const lMap = {“Under 90 mins”:“short”,“90-120 mins”:“mid”,“2+ hours, I’m committed”:“long”,“Series episode is fine”:“long”};
if (ans.len) { if (film.len.includes(lMap[ans.len])) s += 18; else s -= 12; }

// who
const wMap = {“Just me”:“solo”,“Partner / date night”:“couple”,“Friends”:“friends”,“Family with kids”:“kids”,“Family, no kids”:“family”};
if (ans.who) { if (film.who.includes(wMap[ans.who])) s += 20; else s -= 6; }

// era
const eraAllow = {“New only (2010s+)”:[“new”],“Open to the 2000s”:[“new”,“2000s”],“90s classics are fine”:[“new”,“2000s”,“90s”],“Any era - even black & white”:[“new”,“2000s”,“90s”,“classic”]};
if (ans.era) { if ((eraAllow[ans.era]||[]).includes(film.era)) s += 10; else s -= 28; }

// subtitles
if (ans.sub === “No” && film.sub === “yes”) s -= 50;
if (ans.sub === “Yes” && film.sub === “yes”) s += 8;

// excluded genres
if (ans.nogens && Array.isArray(ans.nogens)) {
if (ans.nogens.includes(“No horror”) && film.genre.includes(“horror”)) s -= 60;
if (ans.nogens.includes(“No romance”) && film.genre.includes(“romance”)) s -= 60;
if (ans.nogens.includes(“No musicals”) && film.genre.includes(“musical”)) s -= 60;
if (ans.nogens.includes(“No animation”) && film.genre.includes(“animation”)) s -= 60;
if (ans.nogens.includes(“No slow burns”) && film.pace === “slow”) s -= 40;
if (ans.nogens.includes(“No heavy violence”) && film.intens === “heavy”) s -= 35;
}

// ending
const endMap = {“Yes - feel good after”:“happy”,“No - tragedy is fine”:“sad”,“Ambiguous is great”:“open”};
if (ans.end) {
const want = endMap[ans.end];
if (want && film.end === want) s += 12;
if (ans.end === “Yes - feel good after” && film.end === “sad”) s -= 25;
}

// style
const styleMap = {“Gritty & realistic”:“gritty”,“Slick & stylized”:“stylized”,“Cozy & warm”:“cozy”,“Dark & atmospheric”:“dark”,“Colorful & vibrant”:“colorful”};
if (ans.style && ans.style !== “Doesn’t matter”) {
if (film.style.includes(styleMap[ans.style])) s += 12;
}

// pacing
if (ans.pace === “Hate them - keep it moving” && film.pace === “slow”) s -= 20;
if (ans.pace === “Love them - give me tension” && film.pace === “slow”) s += 12;
if (ans.pace === “Love them - give me tension” && film.pace === “fast”) s -= 8;

// setting
const setMap = {“Space / Sci-fi”:“space”,“Historical / Period”:“hist”,“Modern day”:“modern”,“Fantasy worlds”:“fantasy”};
if (ans.set && ans.set !== “Doesn’t matter” && film.set === setMap[ans.set]) s += 10;

// intensity
const intMap = {“Keep it light”:“light”,“Some weight is fine”:“med”,“Devastate me”:“heavy”};
if (ans.intens && ans.intens !== “Whatever serves the story”) {
if (film.intens === intMap[ans.intens]) s += 12;
if (ans.intens === “Keep it light” && film.intens === “heavy”) s -= 25;
if (ans.intens === “Devastate me” && film.intens === “light”) s -= 18;
}

// comedy
if (ans.comedy === “No, keep it serious” && film.genre.includes(“comedy”)) s -= 15;
if (ans.comedy === “Yes, definitely” && film.genre.includes(“comedy”)) s += 10;

// classics seen
if (ans.seen === “No” && film.era === “classic”) s -= 15;
if (ans.seen === “Yes” && film.era === “classic”) s += 5;

// obscure
if (ans.obscure === “I want an obscure gem” && [“new”,“2000s”].includes(film.era)) s += 5;

// director match (fuzzy)
if (ans.dir && ans.dir !== “No preference” && ans.dir.length > 2) {
const dLower = ans.dir.toLowerCase();
if (film.d.toLowerCase().includes(dLower) || dLower.split(” “).some(w => w.length > 3 && film.d.toLowerCase().includes(w))) s += 40;
}

// bias recent data toward highest-rated films by adding slight quality bonus
s += Math.random() * 14;
return s;
}

function pick(ans, seen) {
const scored = F.map(f => ({f, s: score(f, ans, seen)}));
scored.sort((a,b) => b.s - a.s);
return scored[0].f;
}

function pick(ans, seen) {
const scored = F.map(f => ({f, s: score(f, ans, seen)}));
scored.sort((a,b) => b.s - a.s);
return scored[0].f;
}

function pick(ans, seen) {
var scored = F.map(function(f){ return {f:f, s:score(f,ans,seen)}; });
scored.sort(function(a,b){ return b.s-a.s; });
return scored[0].f;
}

function advance(skip) {
var q = QS[state.qi];
var val = skip ? ‘skip’ : (q.type===‘text’ ? (state.txt.trim()||‘skip’) : (state.sel||‘skip’));
state.ans[q.id] = val;
state.sel = null;
state.txt = ‘’;
if (state.qi < QS.length-1) {
state.qi++;
